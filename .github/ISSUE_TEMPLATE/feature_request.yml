name: Feature Request
description: Sugerează o funcționalitate nouă
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: integration
    attributes:
      label: Integrare
      options:
        - Premier Energy (gaze naturale)
        - Hidroelectrica (energie electrică)
        - Ambele
  - type: textarea
    id: problem
    attributes:
      label: Problema / nevoia
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Soluție propusă
