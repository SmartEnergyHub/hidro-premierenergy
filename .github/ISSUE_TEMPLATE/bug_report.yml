name: Bug Report
description: Something is broken in Premier Energy or Hidroelectrica
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste passwords, tokens, or unredacted diagnostics.
  - type: dropdown
    id: integration
    attributes:
      label: Integration
      options:
        - premier_energy
        - hidroelectrica
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: install_type
    attributes:
      label: Installation type
      options:
        - Home Assistant OS
        - Supervised
        - Container
        - Core (venv)
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (redacted)
