name: Bug Report
description: Raportează un bug în integrarea Premier Energy sau Hidroelectrica
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: integration
    attributes:
      label: Integrare
      options:
        - Premier Energy (gaze naturale)
        - Hidroelectrica (energie electrică)
        - Ambele
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Descriere
      description: Ce nu funcționează?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pași de reproducere
  - type: input-text
    id: ha_version
    attributes:
      label: Versiune Home Assistant
  - type: checkboxes
    id: debug
    attributes:
      label: Debug
      options:
        - label: Am atașat diagnostics / support bundle redactat
          required: false
