name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-metadata:
    name: Configure repository metadata
    runs-on: ubuntu-latest
    permissions:
      administration: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.update({
              owner,
              repo,
              description:
                "Home Assistant FULL AUTO — Premier Energy (gaze naturale) + Hidroelectrica (energie electrică). HACS custom integrations for Romania.",
              has_discussions: true,
            });
            await github.rest.repos.replaceAllTopics({
              owner,
              repo,
              names: [
                "homeassistant",
                "hacs-integration",
                "integration",
                "romania",
                "energy",
                "utility",
              ],
            });

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets and sensitive files
        run: ./scripts/verify-repo-clean.sh

  lint:
    name: Lint & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install ruff
      - name: Ruff check
        run: ruff check custom_components/
      - name: Ruff format check
        run: ruff format --check custom_components/
      - name: Compile all modules
        run: python -m compileall -q custom_components/

  hassfest:
    name: Validate with hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    needs: repo-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
