title = "hidro-premierenergy gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Public keys and documentation placeholders"
regexes = [
  '''6LdWVgYfAAAAAOtv1JCMvOVYagKN_I7Tt8EMCBWx''',
  '''your_password_here''',
  '''example_password''',
  '''dummy_value''',
  '''test_token_example''',
  '''YOUR_GITHUB_TOKEN''',
]
paths = [
  '''custom_components/hidroelectrica/lib/config\.py''',
]
